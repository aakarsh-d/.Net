version: '3.9'

services:

  # ─── Message Broker ───────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"       # AMQP port (services connect here)
      - "15672:15672"     # Management UI — open http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Databases (one per service) ─────────────────────────────────────────────
  student-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: student-db
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - student-db-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15

  course-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: course-db
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1434:1433"
    volumes:
      - course-db-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15

  fee-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fee-db
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1435:1433"
    volumes:
      - fee-db-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "YourStrong@Passw0rd" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 15

  # ─── Microservices ────────────────────────────────────────────────────────────
  student-service:
    build:
      context: ./src
      dockerfile: StudentService/Dockerfile
    container_name: student-service
    ports:
      - "5001:8080"       # Swagger UI: http://localhost:5001/swagger
    environment:
      - ConnectionStrings__StudentDb=Server=student-db;Database=StudentDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      student-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  course-service:
    build:
      context: ./src
      dockerfile: CourseService/Dockerfile
    container_name: course-service
    ports:
      - "5002:8080"       # Swagger UI: http://localhost:5002/swagger
    environment:
      - ConnectionStrings__CourseDb=Server=course-db;Database=CourseDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      course-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  fee-service:
    build:
      context: ./src
      dockerfile: FeeService/Dockerfile
    container_name: fee-service
    ports:
      - "5003:8080"       # Swagger UI: http://localhost:5003/swagger
    environment:
      - ConnectionStrings__FeeDb=Server=fee-db;Database=FeeDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      fee-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  student-db-data:
  course-db-data:
  fee-db-data:
